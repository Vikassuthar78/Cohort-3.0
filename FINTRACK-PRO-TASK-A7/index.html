<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Login — FinTrack Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-brand">
      <div class="brand-mark">₣</div>
    </div>
    <h1 class="auth-title">Welcome Back</h1>
    <p class="auth-sub">Login to FinTrack Pro</p>

    <div class="auth-error" id="authError"></div>
    <div class="auth-success" id="authSuccess"></div>

    <form onsubmit="handleLogin(event)">
      <div class="field">
        <label>Username</label>
        <input type="text" id="loginUsername" autocomplete="username" placeholder="Enter your username">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="loginPassword" autocomplete="current-password" placeholder="Enter your password">
      </div>
      <button type="submit" class="btn btn-primary">Login</button>
    </form>

    <p class="auth-foot">Don't have an account? <a href="register.html">Register here</a></p>
  </div>
</div>

<script src="js/script.js"></script>
<script>checkRegisteredBanner();</script>
</body>
</html>
